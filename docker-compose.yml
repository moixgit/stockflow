version: "3.9"

services:
  mongodb:
    image: mongo:7.0
    container_name: stockflow_mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_ROOT_USER:-admin}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_ROOT_PASS:-stockflow123}
      MONGO_INITDB_DATABASE: stockflow
    volumes:
      - mongo_data:/data/db
      - ./mongo-init.js:/docker-entrypoint-initdb.d/mongo-init.js:ro
    ports:
      - "27017:27017"
    networks:
      - stockflow_net
    healthcheck:
      test: echo 'db.runCommand("ping").ok' | mongosh localhost:27017/stockflow --quiet
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: stockflow_backend
    restart: unless-stopped
    environment:
      NODE_ENV: production
      PORT: 5000
      MONGO_URI: mongodb://${MONGO_ROOT_USER:-admin}:${MONGO_ROOT_PASS:-stockflow123}@mongodb:27017/stockflow?authSource=admin
      JWT_SECRET: ${JWT_SECRET:-stockflow_jwt_secret_change_in_production}
      JWT_EXPIRES_IN: 7d
    ports:
      - "5000:5000"
    depends_on:
      mongodb:
        condition: service_healthy
    networks:
      - stockflow_net
    volumes:
      - uploads_data:/app/uploads

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL:-http://46.62.150.43/5000/api}
    container_name: stockflow_frontend
    restart: unless-stopped
    ports:
      - "3000:80"
    depends_on:
      - backend
    networks:
      - stockflow_net

